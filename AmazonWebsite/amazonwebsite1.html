<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>amazon website</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif;
      }

      body {
        background: #e3e6e6;
      }

      a {
        text-decoration: none;
        color: #007185;
      }

      /* Header */
      .header {
        background: #131921;
        color: #fff;
      }

      .nav {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 10px;
      }

      .logo {
        font-size: 22px;
        font-weight: 700;
      }

      .logo span {
        color: #f3a847;
      }

      .location {
        font-size: 12px;
      }

      .search {
        flex: 1;
        display: flex;
      }

      .search select {
        padding: 10px;
        border: none;
      }

      .search input {
        flex: 1;
        padding: 10px;
        border: none;
      }

      .search button {
        padding: 10px 14px;
        border: none;
        background: #febd69;
      }

      .nav-item {
        font-size: 12px;
      }

      .nav-item strong {
        display: block;
        font-size: 14px;
      }

      .cart {
        font-size: 16px;
        font-weight: 600;
      }

      .subnav {
        background: #232f3e;
        color: #fff;
        padding: 8px 12px;
        font-size: 14px;
      }
      .subnav a {
        color: #fff;
        margin-right: 14px;
      }

      /* Hero */
      .hero {
        background: url("https://images.unsplash.com/photo-1515165562835-c4c5c9c1a3a0?q=80&w=1600&auto=format&fit=crop")
          center/cover no-repeat;
        height: 280px;
        background: linear-gradient(180deg, #ffd77d, #e3e6e6);
        padding: 40px 20px;
        text-align: center;
        font-size: 22px;
        font-weight: bold;
      }

      /* Products */
      .container {
        max-width: 1200px;
        margin: -120px auto 20px;
        padding: 0 10px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
        gap: 20px;
      }

      .card {
        background: #fff;
        padding: 16px;
        border-radius: 6px;
      }

      .card h3 {
        margin-bottom: 10px;
        font-size: 18px;
      }

      .card img {
        width: 100%;
        height: 180px;
        object-fit: cover;
        margin-bottom: 10px;
      }

      .card a {
        font-size: 14px;
      }

      /* Footer */
      footer {
        background: #232f3e;
        color: #fff;
        margin-top: 30px;
      }

      .footer-top {
        background: #37475a;
        text-align: center;
        padding: 12px;
      }

      .footer-links {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 20px;
        padding: 30px;
      }

      .footer-links h4 {
        margin-bottom: 10px;
      }

      .footer-links a {
        display: block;
        color: #ddd;
        font-size: 14px;
        margin-bottom: 6px;
      }

      .footer-bottom {
        text-align: center;
        padding: 14px;
        background: #131921;
        font-size: 12px;
      }
    </style>
    <script src="script.js"></script>
  </head>
</html>
